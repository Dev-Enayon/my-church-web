<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0E1B2D">
    <title>Gospel Of Truth Mission — Church Anthem</title>
    <link rel="icon" href="./image/favicon.jpeg" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap');

        :root {
          --ink: #0E1B2D;
          --ink-soft: #1C2D44;
          --paper: #FAF7F2;
          --paper-warm: #F3EDE4;
          --paper-card: #FFFFFF;
          --gold: #B8860B;
          --gold-light: #D4A84B;
          --gold-faint: rgba(184, 134, 11, 0.08);
          --gold-glow: rgba(184, 134, 11, 0.25);
          --warm-gray: #8C8279;
          --warm-gray-light: #B5AEA6;
          --border: #E6E0D8;
          --border-light: #F0ECE6;
          --text: #2C2824;
          --text-secondary: #5E564E;
          --text-muted: #9A9189;
          --font-display: 'DM Serif Display', Georgia, serif;
          --font-body: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
          --font-script: 'Cormorant Garamond', Georgia, serif;
          --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
        body {
          font-family: var(--font-body);
          color: var(--text);
          background: var(--ink);
          min-height: 100vh;
          min-height: 100dvh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          position: relative;
        }

        ::selection { background: var(--gold); color: #fff; }
        :focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

        /* --- Particle canvas --- */
        #particles {
          position: fixed;
          inset: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
          z-index: 0;
        }

        /* --- Ambient background glow --- */
        body::before {
          content: '';
          position: fixed;
          top: -30%;
          left: -10%;
          width: 120%;
          height: 160%;
          background:
            radial-gradient(ellipse at 30% 20%, rgba(184, 134, 11, 0.06) 0%, transparent 50%),
            radial-gradient(ellipse at 70% 80%, rgba(184, 134, 11, 0.04) 0%, transparent 50%);
          pointer-events: none;
          z-index: 0;
          animation: ambientDrift 20s ease-in-out infinite alternate;
        }

        @keyframes ambientDrift {
          0% { transform: translate(0, 0); }
          100% { transform: translate(-3%, 2%); }
        }

        /* --- Main card --- */
        .anthem-card {
          position: relative;
          z-index: 1;
          width: min(560px, 92vw);
          background: rgba(255, 255, 255, 0.04);
          border: 1px solid rgba(255, 255, 255, 0.08);
          border-radius: 24px;
          padding: 48px 40px;
          backdrop-filter: blur(24px);
          -webkit-backdrop-filter: blur(24px);
          text-align: center;
          color: #fff;
          opacity: 0;
          animation: cardEnter 0.8s var(--ease) 0.2s forwards;
        }

        @keyframes cardEnter {
          from { opacity: 0; transform: translateY(24px) scale(0.97); filter: blur(4px); }
          to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* --- Cross --- */
        .cross {
          color: var(--gold);
          font-size: 2rem;
          margin-bottom: 20px;
          opacity: 0;
          animation: crossEnter 0.6s var(--ease) 0.4s forwards, crossPulse 3.5s ease-in-out 1.5s infinite;
        }

        @keyframes crossEnter {
          from { opacity: 0; transform: scale(0.6) rotate(-10deg); }
          to { opacity: 0.8; transform: scale(1) rotate(0deg); }
        }

        @keyframes crossPulse {
          0%, 100% { transform: scale(1); opacity: 0.8; }
          50% { transform: scale(1.1); opacity: 1; }
        }

        /* --- Title --- */
        .anthem-title {
          font-family: var(--font-display);
          font-size: clamp(1.5rem, 5vw, 2rem);
          font-weight: 400;
          letter-spacing: -0.02em;
          line-height: 1.2;
          margin-bottom: 8px;
          opacity: 0;
          animation: fadeUp 0.6s var(--ease) 0.5s forwards;
        }

        .anthem-subtitle {
          font-family: var(--font-script);
          font-size: 1.1rem;
          font-style: italic;
          color: rgba(255, 255, 255, 0.5);
          margin-bottom: 32px;
          opacity: 0;
          animation: fadeUp 0.6s var(--ease) 0.6s forwards;
        }

        /* --- Decorative rule --- */
        .rule {
          width: 0;
          height: 1px;
          background: linear-gradient(90deg, transparent, var(--gold), transparent);
          margin: 0 auto 32px;
          animation: ruleExpand 1s var(--ease) 0.7s forwards;
        }

        @keyframes ruleExpand { to { width: 160px; } }

        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(12px); }
          to { opacity: 1; transform: translateY(0); }
        }

        /* --- Vinyl / disc visual --- */
        .disc-wrap {
          position: relative;
          width: 200px;
          height: 200px;
          margin: 0 auto 36px;
          opacity: 0;
          animation: fadeUp 0.6s var(--ease) 0.8s forwards;
        }

        .disc {
          width: 200px;
          height: 200px;
          border-radius: 50%;
          background:
            radial-gradient(circle at center, rgba(184, 134, 11, 0.3) 0%, rgba(184, 134, 11, 0.05) 30%, transparent 50%),
            conic-gradient(from 0deg,
              rgba(255, 255, 255, 0.03) 0deg,
              rgba(255, 255, 255, 0.08) 30deg,
              rgba(255, 255, 255, 0.02) 60deg,
              rgba(255, 255, 255, 0.07) 90deg,
              rgba(255, 255, 255, 0.03) 120deg,
              rgba(255, 255, 255, 0.08) 150deg,
              rgba(255, 255, 255, 0.02) 180deg,
              rgba(255, 255, 255, 0.07) 210deg,
              rgba(255, 255, 255, 0.03) 240deg,
              rgba(255, 255, 255, 0.08) 270deg,
              rgba(255, 255, 255, 0.02) 300deg,
              rgba(255, 255, 255, 0.07) 330deg,
              rgba(255, 255, 255, 0.03) 360deg
            );
          border: 2px solid rgba(255, 255, 255, 0.1);
          position: relative;
          transition: transform 0.4s var(--ease);
        }

        .disc.playing {
          animation: spin 4s linear infinite;
        }

        .disc.paused {
          animation: spin 4s linear infinite;
          animation-play-state: paused;
        }

        @keyframes spin {
          to { transform: rotate(360deg); }
        }

        .disc-center {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          width: 60px;
          height: 60px;
          border-radius: 50%;
          background: var(--ink);
          border: 2px solid rgba(184, 134, 11, 0.3);
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .disc-center-dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: var(--gold);
        }

        /* --- Waveform bars --- */
        .waveform {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 3px;
          height: 40px;
          margin-bottom: 28px;
          opacity: 0;
          animation: fadeUp 0.5s var(--ease) 0.9s forwards;
        }

        .wave-bar {
          width: 3px;
          height: 6px;
          background: var(--gold);
          border-radius: 2px;
          opacity: 0.4;
          transition: height 0.15s ease, opacity 0.15s ease;
        }

        .waveform.active .wave-bar {
          animation: waveAnim 1.2s ease-in-out infinite;
        }

        .wave-bar:nth-child(1) { animation-delay: 0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.05s; }
        .wave-bar:nth-child(3) { animation-delay: 0.1s; }
        .wave-bar:nth-child(4) { animation-delay: 0.15s; }
        .wave-bar:nth-child(5) { animation-delay: 0.2s; }
        .wave-bar:nth-child(6) { animation-delay: 0.25s; }
        .wave-bar:nth-child(7) { animation-delay: 0.3s; }
        .wave-bar:nth-child(8) { animation-delay: 0.35s; }
        .wave-bar:nth-child(9) { animation-delay: 0.4s; }
        .wave-bar:nth-child(10) { animation-delay: 0.45s; }
        .wave-bar:nth-child(11) { animation-delay: 0.5s; }
        .wave-bar:nth-child(12) { animation-delay: 0.55s; }
        .wave-bar:nth-child(13) { animation-delay: 0.6s; }
        .wave-bar:nth-child(14) { animation-delay: 0.55s; }
        .wave-bar:nth-child(15) { animation-delay: 0.5s; }
        .wave-bar:nth-child(16) { animation-delay: 0.45s; }
        .wave-bar:nth-child(17) { animation-delay: 0.4s; }
        .wave-bar:nth-child(18) { animation-delay: 0.35s; }
        .wave-bar:nth-child(19) { animation-delay: 0.3s; }
        .wave-bar:nth-child(20) { animation-delay: 0.25s; }

        @keyframes waveAnim {
          0%, 100% { height: 6px; opacity: 0.3; }
          50% { height: 36px; opacity: 0.8; }
        }

        /* --- Progress bar --- */
        .progress-wrap {
          margin-bottom: 20px;
          opacity: 0;
          animation: fadeUp 0.5s var(--ease) 1s forwards;
        }

        .progress-bar {
          width: 100%;
          height: 4px;
          background: rgba(255, 255, 255, 0.1);
          border-radius: 2px;
          cursor: pointer;
          position: relative;
          overflow: hidden;
        }

        .progress-fill {
          height: 100%;
          background: var(--gold);
          border-radius: 2px;
          width: 0%;
          transition: width 0.3s linear;
        }

        .time-display {
          display: flex;
          justify-content: space-between;
          font-size: 0.75rem;
          color: rgba(255, 255, 255, 0.35);
          margin-top: 6px;
          font-variant-numeric: tabular-nums;
        }

        /* --- Controls --- */
        .controls {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 16px;
          opacity: 0;
          animation: fadeUp 0.5s var(--ease) 1.1s forwards;
        }

        .ctrl-btn {
          background: none;
          border: none;
          cursor: pointer;
          color: rgba(255, 255, 255, 0.6);
          transition: all 0.25s var(--ease);
          display: flex;
          align-items: center;
          justify-content: center;
          border-radius: 50%;
        }

        .ctrl-btn:hover {
          color: #fff;
          transform: scale(1.1);
        }

        .ctrl-btn:active {
          transform: scale(0.95);
        }

        .ctrl-btn.skip {
          width: 44px;
          height: 44px;
        }

        .play-btn {
          width: 64px;
          height: 64px;
          background: var(--gold);
          color: #fff;
          border-radius: 50%;
          box-shadow: 0 4px 24px var(--gold-glow);
          transition: all 0.3s var(--ease);
        }

        .play-btn:hover {
          background: var(--gold-light);
          transform: scale(1.08);
          box-shadow: 0 8px 32px var(--gold-glow);
        }

        .play-btn:active {
          transform: scale(0.96);
        }

        /* --- Volume --- */
        .volume-wrap {
          display: flex;
          align-items: center;
          gap: 10px;
          margin-top: 24px;
          opacity: 0;
          animation: fadeUp 0.5s var(--ease) 1.2s forwards;
        }

        .volume-icon {
          color: rgba(255, 255, 255, 0.4);
          font-size: 0.85rem;
          flex-shrink: 0;
        }

        .volume-slider {
          -webkit-appearance: none;
          appearance: none;
          width: 100px;
          height: 4px;
          background: rgba(255, 255, 255, 0.1);
          border-radius: 2px;
          outline: none;
          cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
          -webkit-appearance: none;
          width: 14px;
          height: 14px;
          border-radius: 50%;
          background: var(--gold);
          cursor: pointer;
          box-shadow: 0 0 8px var(--gold-glow);
        }

        .volume-slider::-moz-range-thumb {
          width: 14px;
          height: 14px;
          border-radius: 50%;
          background: var(--gold);
          cursor: pointer;
          border: none;
        }

        /* --- Footer link --- */
        .back-link {
          position: relative;
          z-index: 1;
          margin-top: 28px;
          color: rgba(255, 255, 255, 0.3);
          font-size: 0.85rem;
          text-decoration: none;
          transition: color 0.25s var(--ease);
          opacity: 0;
          animation: fadeUp 0.5s var(--ease) 1.3s forwards;
        }

        .back-link:hover {
          color: var(--gold);
        }

        /* --- Responsive --- */
        @media (max-width: 480px) {
          .anthem-card {
            padding: 36px 24px;
            border-radius: 20px;
          }

          .disc-wrap, .disc {
            width: 160px;
            height: 160px;
          }

          .disc-center {
            width: 48px;
            height: 48px;
          }

          .play-btn {
            width: 56px;
            height: 56px;
          }

          .volume-slider {
            width: 80px;
          }
        }

        /* --- Reduced motion --- */
        @media (prefers-reduced-motion: reduce) {
          *, *::before, *::after {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 0.01ms !important;
          }
          .anthem-card, .cross, .anthem-title, .anthem-subtitle,
          .rule, .disc-wrap, .waveform, .progress-wrap,
          .controls, .volume-wrap, .back-link {
            opacity: 1;
            transform: none;
            filter: none;
            width: auto;
          }
          .rule { width: 160px; }
          #particles { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <div class="anthem-card">
        <div class="cross">&#10011;</div>
        <h1 class="anthem-title">Gospel Of Truth Mission</h1>
        <p class="anthem-subtitle">National Church Anthem</p>
        <div class="rule"></div>

        <!-- Vinyl disc -->
        <div class="disc-wrap">
            <div class="disc" id="disc">
                <div class="disc-center">
                    <div class="disc-center-dot"></div>
                </div>
            </div>
        </div>

        <!-- Waveform -->
        <div class="waveform" id="waveform">
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
        </div>

        <!-- Progress -->
        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="ctrl-btn skip" onclick="skip(-10)" aria-label="Rewind 10 seconds">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/><text x="12" y="16" text-anchor="middle" fill="currentColor" stroke="none" font-size="7" font-family="sans-serif" font-weight="600">10</text></svg>
            </button>

            <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()" aria-label="Play">
                <svg id="playIcon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
                <svg id="pauseIcon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
            </button>

            <button class="ctrl-btn skip" onclick="skip(10)" aria-label="Forward 10 seconds">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/><text x="12" y="16" text-anchor="middle" fill="currentColor" stroke="none" font-size="7" font-family="sans-serif" font-weight="600">10</text></svg>
            </button>
        </div>

        <!-- Volume -->
        <div class="volume-wrap">
            <span class="volume-icon">&#128266;</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="0.8" oninput="setVolume(this.value)">
        </div>
    </div>

    <a href="index.html" class="back-link">&larr; Back to Home</a>

    <audio id="anthemAudio" preload="metadata">
        <source src="audio/church-anthem.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- Particle system ---
        (function () {
            var c = document.getElementById('particles');
            if (!c || window.matchMedia('(prefers-reduced-motion: reduce)').matches) { if(c) c.style.display='none'; return; }
            var ctx = c.getContext('2d'), pts = [], N = 30;
            function resize() { c.width = innerWidth; c.height = innerHeight; }
            function P() { this.reset(); }
            P.prototype.reset = function () {
                this.x = Math.random() * c.width;
                this.y = Math.random() * c.height;
                this.r = Math.random() * 2 + 0.6;
                this.vx = (Math.random() - 0.5) * 0.2;
                this.vy = -Math.random() * 0.3 - 0.08;
                this.o = Math.random() * 0.4 + 0.05;
                this.fs = Math.random() * 0.003 + 0.001;
                this.up = Math.random() > 0.5;
                this.w = Math.random() * Math.PI * 2;
                this.ws = Math.random() * 0.015 + 0.005;
            };
            P.prototype.update = function () {
                this.w += this.ws;
                this.x += this.vx + Math.sin(this.w) * 0.1;
                this.y += this.vy;
                this.o += this.up ? this.fs : -this.fs;
                if (this.o > 0.5) this.up = false;
                if (this.o <= 0) this.reset();
                if (this.y < -10) { this.reset(); this.y = c.height + 10; }
            };
            P.prototype.draw = function () {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(184,134,11,' + this.o + ')';
                ctx.fill();
            };
            function loop() {
                ctx.clearRect(0, 0, c.width, c.height);
                pts.forEach(function (p) { p.update(); p.draw(); });
                requestAnimationFrame(loop);
            }
            resize();
            for (var i = 0; i < N; i++) pts.push(new P());
            loop();
            addEventListener('resize', resize);
        })();

        // --- Audio player ---
        var audio = document.getElementById('anthemAudio');
        var playBtn = document.getElementById('playBtn');
        var playIcon = document.getElementById('playIcon');
        var pauseIcon = document.getElementById('pauseIcon');
        var disc = document.getElementById('disc');
        var waveform = document.getElementById('waveform');
        var progressFill = document.getElementById('progressFill');
        var currentTimeEl = document.getElementById('currentTime');
        var durationEl = document.getElementById('duration');
        var progressBar = document.getElementById('progressBar');

        function togglePlay() {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        audio.addEventListener('play', function () {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
            disc.classList.add('playing');
            disc.classList.remove('paused');
            waveform.classList.add('active');
            playBtn.setAttribute('aria-label', 'Pause');
        });

        audio.addEventListener('pause', function () {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            disc.classList.remove('playing');
            disc.classList.add('paused');
            waveform.classList.remove('active');
            playBtn.setAttribute('aria-label', 'Play');
        });

        audio.addEventListener('ended', function () {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            disc.classList.remove('playing', 'paused');
            waveform.classList.remove('active');
            progressFill.style.width = '0%';
            currentTimeEl.textContent = '0:00';
        });

        audio.addEventListener('timeupdate', function () {
            if (audio.duration) {
                var pct = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = pct + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        });

        audio.addEventListener('loadedmetadata', function () {
            durationEl.textContent = formatTime(audio.duration);
        });

        progressBar.addEventListener('click', function (e) {
            if (audio.duration) {
                var rect = progressBar.getBoundingClientRect();
                var pct = (e.clientX - rect.left) / rect.width;
                audio.currentTime = pct * audio.duration;
            }
        });

        function skip(sec) {
            audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
        }

        function setVolume(val) {
            audio.volume = val;
        }

        function formatTime(s) {
            var m = Math.floor(s / 60);
            var sec = Math.floor(s % 60);
            return m + ':' + (sec < 10 ? '0' : '') + sec;
        }

        // Set initial volume
        audio.volume = 0.8;
    </script>
</body>
</html>
