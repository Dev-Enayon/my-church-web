<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0E1B2D">
    <title>Gospel of Truth Mission — Hymn Book</title>
    <link rel="icon" href="./image/favicon.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="hymn-app.css">
</head>
<body>

    <div class="app-wrap">
        <!-- Settings button -->
        <button class="settings-toggle" id="settingsIcon" aria-label="Settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>

        <!-- Header -->
        <header class="app-header">
            <div class="header-cross">&#10011;</div>
            <h1>Gospel of Truth Mission</h1>
            <p class="app-subtitle">Hymn Book</p>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-mode-toggle">
                <button class="mode-btn active" data-mode="number">By Number</button>
                <button class="mode-btn" data-mode="text">By Lyrics</button>
            </div>

            <!-- Number search -->
            <div class="search-panel" id="searchByNumber">
                <label for="hymnNumber" class="sr-only">Hymn Number</label>
                <div class="input-row">
                    <input type="number" id="hymnNumber" placeholder="Enter hymn number (e.g. 1, 125, 204)" min="1">
                    <button class="find-btn" id="findBtn" onclick="findHymn()">Find</button>
                </div>
            </div>

            <!-- Text search -->
            <div class="search-panel hidden" id="searchByText">
                <label for="hymnSearch" class="sr-only">Search hymn lyrics</label>
                <div class="input-row">
                    <input type="text" id="hymnSearch" placeholder="Type the first few words of a hymn...">
                    <button class="find-btn" id="searchBtn" onclick="searchHymn()">Search</button>
                </div>
            </div>

            <!-- Language -->
            <div class="lang-select">
                <label for="languageSelect">Language:</label>
                <select id="languageSelect" onchange="updateLanguage()">
                    <option value="en">English</option>
                    <option value="yo">Yoruba</option>
                </select>
            </div>
        </section>

        <!-- Search Results (for text search) -->
        <div id="searchResults" class="search-results hidden"></div>

        <!-- Hymn Details -->
        <div id="hymnDetails" class="hymn-details"></div>

        <!-- Back button (shown after viewing a hymn) -->
        <div id="hymnActionBtns" class="hymn-actions hidden">
            <button class="back-btn" onclick="backToHome()">Back to Search</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-card">
            <button class="modal-close" onclick="closeSettings()" aria-label="Close settings">&times;</button>
            <h2>Settings</h2>
            <div class="setting-row">
                <label for="darkModeToggleSetting">Dark Mode</label>
                <input type="checkbox" id="darkModeToggleSetting" onclick="toggleDarkMode()">
            </div>
            <button class="modal-btn" onclick="backToHome(); closeSettings();">Back to Home</button>
        </div>
    </div>

    <script src="hymn-app.js"></script>
</body>
</html>
