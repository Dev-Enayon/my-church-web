<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTM FM</title>
    <link rel="icon" href="./image/favicon.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="fm.css">
</head>
<body>

    <div class="center-box">
        <h1 id="title">GTM FM</h1>
        <p id="songName">Song 1</p>
        <div class="controls">
            <button onclick="prevSong()" aria-label="Previous song">&#9198;</button>
            <button onclick="togglePlay()" id="playBtn" aria-label="Play / Pause">&#9654;</button>
            <button onclick="nextSong()" aria-label="Next song">&#9197;</button>
        </div>
    </div>

    <div class="wave-container">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <audio id="player"></audio>

    <script>
        var songs = [
            { name: "Song 1", file: "audio/song1.mp3" },
            { name: "Song 2", file: "audio/song2.mp3" },
            { name: "Song 3", file: "audio/song3.mp3" }
        ];

        var index = 0;
        var player = document.getElementById("player");
        var playBtn = document.getElementById("playBtn");
        var songName = document.getElementById("songName");

        function loadSong() {
            player.src = songs[index].file;
            songName.textContent = songs[index].name;
        }

        function togglePlay() {
            if (player.paused) {
                player.play();
                playBtn.innerHTML = "&#9646;&#9646;";
            } else {
                player.pause();
                playBtn.innerHTML = "&#9654;";
            }
        }

        function nextSong() {
            index = (index + 1) % songs.length;
            loadSong();
            player.play();
            playBtn.innerHTML = "&#9646;&#9646;";
        }

        function prevSong() {
            index = (index - 1 + songs.length) % songs.length;
            loadSong();
            player.play();
            playBtn.innerHTML = "&#9646;&#9646;";
        }

        player.addEventListener("ended", nextSong);
        loadSong();
    </script>

</body>
</html>
